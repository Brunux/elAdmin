{% extends "base.html" %}

{% block title %}Iniciar sesión{% endblock %}

{% block body %}
<div class="page page-center">
  <div class="container container-tight py-4">
    <div class="text-center mb-4">
      <h1 class="fw-bold">
        <i class="ti ti-building me-2"></i>El Admin
      </h1>
      <p class="text-secondary">Administración de edificio</p>
    </div>
    <div class="card card-md">
      <div class="card-body">
        <h2 class="h2 text-center mb-4">Iniciar sesión</h2>
        {% if messages %}
          {% for message in messages %}
            <div class="alert alert-danger">{{ message }}</div>
          {% endfor %}
        {% endif %}
        <form method="post" autocomplete="off">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label">Usuario</label>
            <input type="text" name="username" class="form-control" placeholder="Ingresa tu usuario" autofocus required>
          </div>
          <div class="mb-2">
            <label class="form-label">Contraseña</label>
            <input type="password" name="password" class="form-control" placeholder="Ingresa tu contraseña" required>
          </div>
          <div class="form-footer">
            <button type="submit" class="btn btn-primary w-100">
              <i class="ti ti-login me-2"></i>Entrar
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
